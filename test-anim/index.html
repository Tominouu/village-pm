<html lang="fr">
<head>

  <title>Shoe Experience</title>

  <style>

      margin: 0;
      padding: 0;
      box-sizing: border-box;

      height: 100%;
      background: #000;
      overflow-x: hidden;
    }

    body {
      height: 4000px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    .section {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
      font-family: Arial, sans-serif;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<section class="section">Nouvelle sneaker</section>
<section class="section">Performance ultime</section>
<section class="section">Design futuriste</section>
